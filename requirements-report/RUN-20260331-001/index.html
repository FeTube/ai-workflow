il terms are checked"],"acceptanceCriteria_zh":["页面展示邮箱表单、OAuth 按钮、协议勾选框","未勾选协议时「Create account」按钮置灰"]},{"id":"F-AUTH-004","title":"Password Setting Rules","title_zh":"密码设置规则","description":"Password must be at least 8 characters with uppercase, lowercase, and numbers.","description_zh":"密码至少 8 位，必须包含大小写字母和数字，提供显示/隐藏切换。","priority":"P0","complexity":"S","linkedPages":["Screen/Register"],"acceptanceCriteria":["Real-time validation of password rules","Show/hide password toggle works"],"acceptanceCriteria_zh":["实时校验密码规则","密码显示/隐藏切换正常"]},{"id":"F-AUTH-005","title":"Terms of Service Agreement","title_zh":"服务条款与隐私政策承接","description":"Registration requires active opt-in checkbox for ToS and Privacy Policy. Login shows passive text.","description_zh":"注册页需主动勾选协议复选框（opt-in），登录页展示被动协议文案。记录用户同意的时间戳和版本号。","priority":"P0","complexity":"M","linkedPages":["Screen/Register","Screen/Login"],"acceptanceCriteria":["Checkbox must be actively checked","ToS and Privacy Policy links are clickable","Consent timestamp and version recorded"],"acceptanceCriteria_zh":["复选框需用户主动勾选","ToS 和 Privacy Policy 链接可点击跳转","记录同意时间戳和协议版本号"]},{"id":"F-AUTH-006","title":"Terms of Service Page","title_zh":"服务条款页面","description":"Static page displaying Terms of Service content with navigation bar and back button.","description_zh":"展示服务条款的静态页面，顶部导航栏含 Logo 和「Back」按钮，内容由法务提供。","priority":"P1","complexity":"S","linkedPages":["Screen/TermsOfService"],"acceptanceCriteria":["Page displays ToS content","Back button returns to previous page","No login required to view"],"acceptanceCriteria_zh":["页面展示服务条款内容","返回按钮可回到上一页","无需登录即可访问"]},{"id":"F-AUTH-007","title":"Privacy Policy Page","title_zh":"隐私政策页面","description":"Static page displaying Privacy Policy content, GDPR/CCPA compliant.","description_zh":"展示隐私政策的静态页面，需符合 GDPR / CCPA 等数据保护法规要求。","priority":"P1","complexity":"S","linkedPages":["Screen/PrivacyPolicy"],"acceptanceCriteria":["Page displays Privacy Policy content","Content meets GDPR/CCPA requirements"],"acceptanceCriteria_zh":["页面展示隐私政策内容","内容符合 GDPR / CCPA 合规要求"]},{"id":"F-AUTH-008","title":"OAuth Supplementary Info Page","title_zh":"OAuth 补充信息页","description":"After first OAuth registration, collects Display Name and Country/Region with skip option.","description_zh":"用户首次 OAuth 注册后，引导补充 Display Name 和 Country / Region，可跳过。展示 OAuth 连接状态标签。","priority":"P0","complexity":"M","linkedPages":["Screen/OAuthSupplementary"],"acceptanceCriteria":["Connected provider badge shown","Display Name pre-filled from provider","Country selector opens modal","Skip option works"],"acceptanceCriteria_zh":["展示 OAuth 连接状态标签","Display Name 从 Provider 预填充","Country 选择器弹出国家弹窗","跳过选项正常工作"]},{"id":"F-AUTH-009","title":"Email Verification Code","title_zh":"邮箱验证码校验","description":"6-digit code verification page shared by registration and forgot-password flows.","description_zh":"6 位验证码校验页面，注册和忘记密码共用。支持自动聚焦、粘贴填充、60 秒重发冷却。","priority":"P0","complexity":"M","linkedPages":["Screen/VerifyCode"],"acceptanceCriteria":["6 individual input boxes with auto-focus","Paste support for full code","60s resend cooldown","5 max attempts before code invalidation"],"acceptanceCriteria_zh":["6 个独立输入框自动聚焦","支持粘贴完整验证码","60 秒重发冷却","连续 5 次错误后验证码失效"]},{"id":"F-AUTH-010","title":"Brand Value Display","title_zh":"品牌价值展示区","description":"Left side brand display area (660px) on registration and login pages.","description_zh":"注册/登录页左侧品牌展示区（660px 宽），全屏背景图 + Logo + 价值主张文案。","priority":"P1","complexity":"S","linkedPages":["Screen/Register","Screen/Login"],"acceptanceCriteria":["Brand image fills 660px left area","Logo and value proposition visible"],"acceptanceCriteria_zh":["品牌图片填充左侧 660px 区域","Logo 和价值主张文案可见"]},{"id":"F-AUTH-011","title":"Email Password Login","title_zh":"邮箱密码登录","description":"User logs in with registered email and password, with remember-me and forgot-password options.","description_zh":"用户使用已注册邮箱和密码登录，支持 Remember me 和 Forgot password 选项。连续错误 5 次锁定 30 分钟。","priority":"P0","complexity":"L","linkedPages":["Scree const features = DATA.features;
const MODULE_DEFS = [
  { key: 'REG',      label: '注册',    range: [1,10]  },
  { key: 'LOGIN',    label: '登录',    range: [11,16] },
  { key: 'LOGOUT',   label: '退出',    range: [17,18] },
  { key: 'PWD',      label: '密码管理', range: [19,20] },
  { key: 'SESSION',  label: '会话管理', range: [21,22] },
  { key: 'SECURITY', label: '安全风控', range: [23,25] }
];
function getModuleKey(f) {
  const num = parseInt(f.id.replace('F-AUTH-',''), 10);
  for (const m of MODULE_DEFS) {
    if (num >= m.range[0] && num <= m.range[1]) return m.key;
  }
  return 'OTHER';
}
const modules = [
  { key: 'all', label: '全部' },
  ...MODULE_DEFS.map(d => ({ key: d.key, label: d.label, filter: f => getModuleKey(f) === d.key }))
];
let activeModule = 'all';
let searchQuery = '';
function renderTabs() {
  document.getElementById('modTabs').innerHTML = modules.map(m => {
    const count = m.key === 'all' ? features.length : features.filter(m.filter).length;
    return '<button class="tab' + (activeModule===m.key?' active':'') + '" onclick="activeModule=\'' + m.key + '\';render()">' + m.label + ' (' + count + ')</button>';
  }).join('');
}
function getFiltered() {
  let list = features;
  if (activeModule !== 'all') {
    const mod = modules.find(m => m.key === activeModule);
    if (mod && mod.filter) list = list.filter(mod.filter);
  }
  if (searchQuery) list = list.filter(f => (f.id + ' ' + (f.title_zh||f.title) + ' ' + (f.description_zh||f.description)).toLowerCase().includes(searchQuery));
  return list;
}
function renderFeatures() {
  const list = getFiltered();
  document.getElementById('featureList').innerHTML = list.map(f => {
    const pClass = f.priority === 'P0' ? 'bp0' : f.priority === 'P1' ? 'bp1' : 'bp2';
    const pages = (f.linkedPages || []).map(p => '<span class="tag">' + p + '</span>').join('');
    const criteria = (f.acceptanceCriteria_zh || f.acceptanceCriteria || []).map(c => '<li>' + c + '</li>').join('');
    return '<div class="feature-card" onclick="this.classList.toggle(\'open\')">' +
      '<div class="feature-header">' +
        '<span class="feature-id">' + f.id + '</span>' +
        '<span class="feature-title">' + (f.title_zh || f.title) + '</span>' +
        '<span class="badge ' + pClass + '">' + f.priority + '</span>' +
        '<span class="badge binfo">' + f.complexity + '</span>' +
        '<span class="chevron">›</span>' +
      '</div>' +
      '<div class="feature-body">' +
        '<p>' + (f.description_zh || f.description) + '</p>' +
        (pages ? '<p><strong>关联设计页:</strong> ' + pages + '</p>' : '<p><span class="badge bfail">无关联设计页</span></p>') +
        (criteria ? '<p><strong>验收标准:</strong></p><ul>' + criteria + '</ul>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}
function renderPrioritySummary() {
  const p0 = features.filter(f=>f.priority==='P0').length;
  const p1 = features.filter(f=>f.priority==='P1').length;
  const p2 = features.filter(f=>f.priority==='P2').length;
  document.getElementById('prioritySummary').innerHTML =
    '<span class="ps-item ps-p0">P0 ' + p0 + '</span>' +
    '<span class="ps-item ps-p1">P1 ' + p1 + '</span>' +
    '<span class="ps-item ps-p2">P2 ' + p2 + '</span>';
}
function renderCoverage() {
  const withDesign = features.filter(f => (f.linkedPages||[]).length > 0);
  const withoutDesign = features.filter(f => !(f.linkedPages||[]).length);
  const covPct = Math.round((withDesign.length / features.length) * 100);
  const covColor = covPct >= 90 ? 'var(--pass)' : covPct >= 80 ? 'var(--warn)' : 'var(--fail)';

  let matrixHtml = '';
  let t0=0,t1=0,t2=0,tTotal=0,tWithDesign=0;
  MODULE_DEFS.forEach(mod => {
    const name = mod.label;
    const fs = features.filter(f => getModuleKey(f) === mod.key);
    const p0 = fs.filter(f=>f.priority==='P0').length;
    const p1 = fs.filter(f=>f.priority==='P1').length;
    const p2 = fs.filter(f=>f.priority==='P2').length;
    const hasDesign = fs.filter(f => (f.linkedPages||[]).length > 0).length;
    const modCov = fs.length > 0 ? Math.round((hasDesign/fs.length)*100) : 0;
    const modColor = modCov >= 90 ? '#22C55E' : modCov >= 80 ? '#F59E0B' : '#EF4444';
    t0+=p0; t1+=p1; t2+=p2; tTotal+=fs.length; tWithDesign+=hasDesign;
    matrixHtml += '<tr><td style="font-weight:600">'+name+'</td><td>'+p0+'</td><td>'+p1+'</td><td>'+p2+'</td><td><strong>'+fs.length+'</strong></td><td>'+hasDesign+'/'+fs.length+'</td><td><span style="color:'+modColor+';font-weight:700">'+modCov+'%</span></td></tr>';
  });
  matrixHtml += '<tr style="font-weight:700;border-top:2px solid var(--border)"><td>合计</td><td>'+t0+'</td><td>'+t1+'</td><td>'+t2+'</td><td>'+tTotal+'</td><td>'+tWithDesign+'/'+tTotal+'</td><td><span style="color:'+covColor+';font-weight:700">'+covPct+'%</span></td></tr>';

  let gapHtml = '';
  if (withoutDesign.length > 0) {
    gapHtml = '<div style="margin-top:14px"><div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">未关联设计页的功能点（' + withoutDesign.length + '）</div>';
    gapHtml += withoutDesign.map(f => {
      const pCls = f.priority==='P0'?'bp0':f.priority==='P1'?'bp1':'bp2';
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px"><span class="badge '+pCls+'">'+f.priority+'</span><span style="font-family:monospace;color:var(--primary);font-size:11px">'+f.id+'</span><span>'+(f.title_zh||f.title)+'</span></div>';
    }).join('');
    gapHtml += '</div>';
  }

  document.getElementById('coverageDetail').innerHTML = `
    <div class="cov-bar">
      <span style="font-size:12px;font-weight:600;color:var(--text2)">需求-设计覆盖度</span>
      <div class="cov-track"><div class="cov-fill" style="width:${covPct}%;background:${covColor}"></div></div>
      <span class="cov-num">${covPct}</span>
    </div>
    <table style="margin-top:12px">
      <thead><tr><th>模块</th><th>P0</th><th>P1</th><th>P2</th><th>功能点</th><th>有设计页</th><th>覆盖度</th></tr></thead>
      <tbody>${matrixHtml}</tbody>
    </table>
    ${gapHtml}
  `;
}
function renderConflicts() {
  const conflicts = DATA.conflicts || [];
  document.getElementById('conflictList').innerHTML = conflicts.map(c => {
    const barClass = c.severity === 'critical' ? 'critical' : c.severity === 'warning' ? 'warning' : 'info';
    const badgeClass = c.severity === 'critical' ? 'bfail' : c.severity === 'warning' ? 'bwarn' : 'binfo';
    const badgeText = c.severity === 'critical' ? '严重' : c.severity === 'warning' ? '警告' : '提示';
    return '<div class="conflict-card"><div class="conflict-bar ' + barClass + '"></div><div><div class="conflict-title">' + (c.type_zh || c.type) + '</div><div class="conflict-desc">' + c.description + '</div><span class="badge ' + badgeClass + '" style="margin-top:4px;display:inline-block">' + badgeText + '</span></div></div>';
  }).join('');
}
function renderUserStories() {
  const stories = DATA.userStories || [];
  document.getElementById('userStoryBody').innerHTML = stories.map(s =>
    '<tr><td><span class="feature-id">' + s.id + '</span></td><td>' + (s.role_zh || s.role) + '</td><td>' + (s.action_zh || s.action) + '</td><td>' + (s.benefit_zh || s.benefit) + '</td></tr>'
  ).join('');
}
function renderTokens() {
  const tokens = DATA.tokens || {};
  const colors = tokens.colors || {};
  const typo = tokens.typography || {};
  const colorKeys = Object.keys(colors);
  const typoKeys = Object.keys(typo).filter(k => k !== 'fontFamily');
  const colorDetails = colorKeys.map(k => k).join(', ');
  const fontFamily = typo.fontFamily || 'DM Sans';
  const fontSizes = [...new Set(typoKeys.map(k => typo[k].fontSize).filter(Boolean))].sort((a,b)=>b-a).map(s=>s+'px').join(', ');
  const compCount = 10;
  const compList = 'Button/Primary, Button/Outline, Button/Google, Button/Apple, Button/Facebook, Button/Loading, Input/Default, Input/Error, Checkbox, Divider/WithText';
  document.getElementById('tokenBody').innerHTML =
    '<tr><td>颜色变量</td><td>' + colorKeys.length + '</td><td>' + colorDetails + '</td></tr>' +
    '<tr><td>字号层级</td><td>' + typoKeys.length + ' 级</td><td>字体: ' + fontFamily + ' | 字号: ' + fontSizes + '</td></tr>' +
    '<tr><td>组件</td><td>' + compCount + '</td><td>' + compList + '</td></tr>';
}
function renderPcPages() {
  const pcPages = (DATA.designPages && DATA.designPages.pc) || [];
  document.getElementById('pcPageGrid').innerHTML = pcPages.map(p =>
    '<div class="page-chip pc">' + (p.name_zh || p.name) + '</div>'
  ).join('');
}
function render() {
  renderPrioritySummary();
  renderTabs();
  renderFeatures();
  renderCoverage();
  renderConflicts();
  renderUserStories();
  renderTokens();
  renderPcPages();
}
document.getElementById('searchBox').oninput = e => { searchQuery = e.target.value.toLowerCase(); renderFeatures(); };
render();
</script>
</body>
</html>
