.container{max-width:1360px;margin:0 auto;padding:0 40px}

.dashboard{background:linear-gradient(135deg,#6432FC 0%,#8B5CF6 50%,#A78BFA 100%);color:#fff;padding:48px 0 32px}
.dashboard h1{font-size:28px;font-weight:700;margin-bottom:8px}
.dashboard .meta{font-size:13px;opacity:.85;margin-bottom:28px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.stat-card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:var(--radius);padding:20px;text-align:center}
.stat-card .value{font-size:32px;font-weight:700}
.stat-card .label{font-size:13px;opacity:.85;margin-top:4px}

.section{padding:32px 0}

.progress-bar{height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin:12px 0 20px}

.progress-fill.orange{background:var(--orange)}
.progress-fill.red{background:var(--red)}

.module-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.module-table tr:hover{background:var(--purple-light)}

.conflict-card.warning{border-color:var(--orange)}
.conflict-card.info{border-color:var(--blue)}

.conflict-type{font-weight:600;font-size:14px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.badge.critical{background:var(--red-bg);color:var(--red)}
.badge.warning{background:var(--orange-bg);color:var(--orange)}
.badge.info{background:var(--blue-bg);color:var(--blue)}

.p-tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px}

.p-tag.P2{background:var(--blue-bg);color:var(--blue)}

.feature-title{flex:1;font-weight:600;font-size:14px}
.feature-priority{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.feature-complexity{font-size:11px;color:var(--text3);margin-left:4px}
.feature-arrow{transition:transform .2s;color:var(--text3)}

.feature-body .desc{font-size:13px;color:var(--text2);margin:12px 0}
.feature-body .pages-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px}
.page-chip{display:inline-block;font-size:11px;background:var(--purple-light);color:var(--purple);padding:3px 10px;border-radius:6px;margin:2px 4px 2px 0}
.ac-list{margin-top:12px;padding-left:20px;font-size:13px;color:var(--text2)}
.ac-list li{margin-bottom:4px}
/* User Stories */
.story-table{width:100%;border-collapse:collapse;font-size:13px}
.story-table th{background:var(--purple-light);color:var(--purple);padding:10px 14px;text-align:left;font-weight:600}
.story-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.story-table tr:hover{background:var(--purple-light)}
/* Tokens */
.token-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.token-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}

.token-card .value{font-size:13px;font-weight:600}
.color-swatch{width:36px;height:36px;border-radius:8px;margin-bottom:8px;border:1px solid var(--border)}

.page-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.page-item{background:var(--card);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);border-left:4px solid var(--purple);font-size:13px;font-weight:500}
.page-item.h5{border-left-color:var(--green)}
.empty-msg{color:var(--text3);font-size:13px;font-style:italic;padding:20px 0}
/* Responsive */
@media(max-width:768px){.container{padding:0 20px}.stats{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style>

const MODULE_DEFS = [
  { key: 'REG', label: '注册', seqs: ['001','002','003','004','005','006','007','008','009'] },
  { key: 'LOGIN', label: '登录', seqs: ['010','011','012','013','014','015'] },
  { key: 'LOGOUT', label: '退出', seqs: ['016','017','018','019','020'] },
  { key: 'PWD', label: '密码与会话', seqs: ['021','022','023','024'] },
  { key: 'SEC', label: '安全风控', seqs: ['025','026','027','028','029','030'] },
  { key: 'LEGAL', label: '法务合规', seqs: ['031','032'] }
];

function getModule(fid) {
  const seq = fid.split('-').pop();
  return MODULE_DEFS.find(m => m.seqs.includes(seq)) || { key: 'OTHER', label: '其他' };
}

function priorityColor(p) {
  return p === 'P0' ? 'var(--red)' : p === 'P1' ? 'var(--orange)' : 'var(--blue)';
}
function priorityBg(p) {
  return p === 'P0' ? 'var(--red-bg)' : p === 'P1' ? 'var(--orange-bg)' : 'var(--blue-bg)';
}

// Dashboard
document.getElementById('meta').textContent = DATA.run_id + ' \u00b7 ' + DATA.requirement_name + ' ' + DATA.requirement_version + ' \u00b7 ' + new Date(DATA.generated_at).toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
const statDefs = [
  ['功能点', DATA.metrics.feature_count],
  ['用户故事', DATA.metrics.user_story_count],
  ['设计页面', DATA.metrics.page_count],
  ['覆盖度', DATA.metrics.coverage + '%'],
  ['冲突项', DATA.metrics.conflict_count]
];
document.getElementById('stats').innerHTML = statDefs.map(s => '<div class="stat-card"><div class="value">' + s[1] + '</div><div class="label">' + s[0] + '</div></div>').join('');

// Coverage
const cov = DATA.coverage;
document.getElementById('coverage-summary').innerHTML = '<div style="font-size:14px;font-weight:600">UI 功能点覆盖度 <span style="color:var(--green);font-size:20px">' + cov.coverage_pct + '%</span></div><div style="font-size:12px;color:var(--text2);margin-top:4px">' + cov.features_with_design + ' / ' + cov.total_features + ' 个功能点有关联设计页（' + cov.features_without_design_reason + '）</div>';
const pf = document.getElementById('progress-fill');
pf.style.width = cov.coverage_pct + '%';
pf.className = 'progress-fill ' + (cov.coverage_pct >= 90 ? 'green' : cov.coverage_pct >= 80 ? 'orange' : 'red');

// Module table
const tbody = document.querySelector('#module-table tbody');
MODULE_DEFS.forEach(mod => {
  const feats = DATA.features.filter(f => mod.seqs.includes(f.id.split('-').pop()));
  const p0 = feats.filter(f => f.priority === 'P0').length;
  const p1 = feats.filter(f => f.priority === 'P1').length;
  const p2 = feats.filter(f => f.priority === 'P2').length;
  const withDesign = feats.filter(f => f.linkedPages.length > 0).length;
  const pct = feats.length ? Math.round(withDesign / feats.length * 100) : 0;
  const color = pct >= 90 ? 'var(--green)' : pct >= 70 ? 'var(--orange)' : 'var(--red)';
  tbody.innerHTML += '<tr><td style="font-weight:600">' + mod.label + '</td><td>' + p0 + '</td><td>' + p1 + '</td><td>' + p2 + '</td><td>' + feats.length + '</td><td>' + withDesign + ' / ' + feats.length + '</td><td style="color:' + color + ';font-weight:600">' + pct + '%</td></tr>';
});

// Unmatched
const noDesign = DATA.features.filter(f => f.linkedPages.length === 0);
if (noDesign.length) {
  document.getElementById('unmatched-list').innerHTML = '<div style="margin-top:16px;font-size:13px"><div style="font-weight:600;margin-bottom:8px;color:var(--text3)">无需独立设计页的功能点（' + noDesign.length + ' 个）</div>' + noDesign.map(f => '<span class="page-chip" style="background:var(--bg)">' + f.id + ' ' + f.title_zh + '</span>').join('') + '</div>';
}

// Conflicts
document.getElementById('conflict-badge').textContent = DATA.metrics.conflict_count + ' 项';
const cf = DATA.conflicts.sort((a,b) => {const o={critical:0,warning:1,info:2};return o[a.severity]-o[b.severity]});
document.getElementById('conflicts').innerHTML = cf.map(c => '<div class="conflict-card ' + c.severity + '"><div class="conflict-header"><span class="conflict-type">' + c.type_zh + '</span><span class="badge ' + c.severity + '">' + ({critical:'严重',warning:'警告',info:'提示'})[c.severity] + '</span></div><div class="conflict-desc">' + c.description + '</div></div>').join('');

// Priority tags
const pCounts = {P0:0,P1:0,P2:0};
DATA.features.forEach(f => pCounts[f.priority]++);
document.getElementById('priority-tags').innerHTML = Object.entries(pCounts).map(([p,n]) => '<span class="p-tag ' + p + '">' + p + ' \u00b7 ' + n + '</span>').join('');

// Module filters
document.getElementById('module-filters').innerHTML = MODULE_DEFS.map(m => '<button class="filter-btn" onclick="filterModule(\'' + m.key + '\')">' + m.label + '</button>').join('');

let currentFilter = 'all';
let currentSearch = '';

function renderFeatures() {
  const el = document.getElementById('features');
  let feats = DATA.features;
  if (currentFilter !== 'all') {
    const mod = MODULE_DEFS.find(m => m.key === currentFilter);
    if (mod) feats = feats.filter(f => mod.seqs.includes(f.id.split('-').pop()));
  }
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    feats = feats.filter(f => f.title_zh.toLowerCase().includes(q) || f.description_zh.toLowerCase().includes(q) || f.id.toLowerCase().includes(q));
  }
  el.innerHTML = feats.map(f => {
    const pages = f.linkedPages.map(p => '<span class="page-chip">' + p + '</span>').join('');
    const acs = (f.acceptanceCriteria_zh||[]).map(a => '<li>' + a + '</li>').join('');
    return '<div class="feature-card" data-id="' + f.id + '"><div class="feature-header" onclick="toggleFeature(this)"><span class="feature-id">' + f.id + '</span><span class="feature-title">' + f.title_zh + '</span><span class="feature-priority" style="background:' + priorityBg(f.priority) + ';color:' + priorityColor(f.priority) + '">' + f.priority + '</span><span class="feature-complexity">' + f.complexity + '</span><span class="feature-arrow">\u25B6</span></div><div class="feature-body"><div class="desc">' + f.description_zh + '</div>' + (pages ? '<div class="pages-label">关联设计页</div>' + pages : '<div class="pages-label" style="color:var(--text3)">无独立设计页（纯后端/内嵌逻辑）</div>') + (acs ? '<div class="pages-label" style="margin-top:12px">验收标准</div><ol class="ac-list">' + acs + '</ol>' : '') + '</div></div>';
  }).join('');
}

function filterModule(key) {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (key === 'all') document.querySelector('.filter-btn').classList.add('active');
  else {
    const btns = document.querySelectorAll('.filter-btn');
    btns.forEach(b => { if (b.textContent === (MODULE_DEFS.find(m=>m.key===key)||{}).label) b.classList.add('active'); });
  }
  renderFeatures();
}

function searchFeatures(q) { currentSearch = q; renderFeatures(); }

function toggleFeature(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.feature-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

renderFeatures();

// User stories
document.getElementById('stories').innerHTML = DATA.userStories.map(s => '<tr><td style="font-weight:600;color:var(--purple)">' + s.id + '</td><td>作为 ' + s.role_zh + '</td><td>我希望 ' + s.action_zh + '</td><td>以便 ' + s.benefit_zh + '</td></tr>').join('');

// Tokens
const colors = DATA.tokens.colors;
const colorKeys = Object.keys(colors);
document.getElementById('tokens-summary').innerHTML = '共 ' + DATA.metrics.design_token_count + ' 个颜色变量 · 字体 DM Sans · 3 种字号 · 3 种字重 · 5 种圆角';
document.getElementById('color-tokens').innerHTML = colorKeys.map(k => '<div class="token-card"><div class="color-swatch" style="background:' + colors[k] + '"></div><div class="name">' + k + '</div><div class="value">' + colors[k] + '</div></div>').join('');

const otherTokens = [];
Object.entries(DATA.tokens.typography.sizes).forEach(([k,v]) => otherTokens.push({name:'font-size-'+k,value:v}));
Object.entries(DATA.tokens.typography.weights).forEach(([k,v]) => otherTokens.push({name:'font-weight-'+k,value:v}));
Object.entries(DATA.tokens.spacing).forEach(([k,v]) => otherTokens.push({name:'spacing-'+k,value:v}));
Object.entries(DATA.tokens.borderRadius).forEach(([k,v]) => otherTokens.push({name:'radius-'+k,value:v}));
document.getElementById('other-tokens').innerHTML = otherTokens.map(t => '<div class="token-card"><div class="name">' + t.name + '</div><div class="value">' + t.value + '</div></div>').join('');

// Design pages
document.getElementById('pc-pages').innerHTML = DATA.designPages.pc.map(p => '<div class="page-item"><strong>' + p.name + '</strong><div style="font-size:11px;color:var(--text3);margin-top:4px">' + p.linkedFeatures.join(', ') + '</div></div>').join('');
if (DATA.designPages.h5.length === 0) {
  document.getElementById('h5-pages').innerHTML = '<div class="empty-msg">H5 端设计稿全部缺失（PRD 中标注为「待设计」），需补齐后重新解析。</div>';
}
</script>
</body>
</html>
