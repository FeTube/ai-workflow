description":"Brand visual and value proposition on registration/login pages","description_zh":"注册/登录页面左侧（PC 端）展示 Looply 品牌视觉和核心价值主张：全屏背景图（660px 宽）、品牌 Logo（白色透明底）和品牌价值主张文案。H5 端不展示。","priority":"P1","complexity":"S","linkedPages":["Screen/Register","Screen/Login"],"acceptanceCriteria":["Brand panel displays correctly on PC"],"acceptanceCriteria_zh":["PC 端左侧品牌区域固定 660px 宽","展示品牌背景图、Logo 和价值主张","H5 端不展示品牌区域"]},{"id":"F-AUTH-011","title":"Email Password Login","title_zh":"邮箱密码登录","description":"User signs in with registered email and password","description_zh":"用户通过已注册邮箱和密码登录。页面包含标题「Welcome back」、邮箱/密码输入框、Remember me 复选框、「Forgot password?」链接、「Sign in」主按钮、OAuth 按钮和底部切换链接。支持设备指纹采集、风控检测、密码错误锁定（5 次锁 30 分钟）。不暴露邮箱是否存在。","priority":"P0","complexity":"L","linkedPages":["Screen/Login","Screen/Login-PasswordVisible","Screen/Login-ErrorState","Screen/Login-LoadingState","H5/Login","H5/Login-PasswordVisible","H5/Login-ErrorState","H5/Login-LoadingState"],"acceptanceCriteria":["User can login with correct credentials"],"acceptanceCriteria_zh":["输入正确邮箱密码后成功登录跳转首页","邮箱格式错误实时提示","密码错误提示「Incorrect email or password」（不区分邮箱/密码）","连续 5 次错误后锁定 30 分钟并展示锁定提示","密码显示/隐藏切换正常","登录按钮显示 loading 状态"]},{"id":"F-AUTH-012","title":"OAuth Quick Login","title_zh":"OAuth 快捷登录","description":"Existing OAuth users can sign in with one click","description_zh":"已通过第三方注册的用户使用 Google / Apple / Facebook 一键登录。未注册用户自动走注册流程。系统判断 provider_uid 是否已绑定，已绑定直接签发 Token，未绑定走 OAuth 注册流程。","priority":"P0","complexity":"M","linkedPages":["Screen/Login","H5/Login"],"acceptanceCriteria":["OAuth login works for registered users"],"acceptanceCriteria_zh":["已绑定用户点击 OAuth 按钮后直接登录","未绑定用户自动进入注册流程","用户取消授权返回登录页"]},{"id":"F-AUTH-013","title":"Forgot Password","title_zh":"忘记密码","description":"User can reset password via email verification","description_zh":"用户忘记密码时通过邮箱验证身份。页面包含钥匙图标、标题「Forgot password?」、邮箱输入框和「Send reset code」按钮。输入邮箱后发送 6 位验证码，不暴露邮箱是否存在（统一提示）。跳转 VerifyCode 页面校验。","priority":"P0","complexity":"M","linkedPages":["Screen/ForgotPassword","H5/ForgotPassword","Screen/VerifyCode","H5/VerifyCode"],"acceptanceCriteria":["Forgot password flow sends verification code"],"acceptanceCriteria_zh":["输入邮箱后点击「Send reset code」发送验证码","未注册邮箱也返回成功提示（防枚举）","发信限频触发时提示"]},{"id":"F-AUTH-014","title":"Reset Password","title_zh":"重置密码","description":"User sets new password after verification","description_zh":"验证码校验通过后设置新密码。页面包含锁图标、标题「Set new password」、新密码和确认密码输入框、「Reset password」按钮。新密码不能与旧密码相同。重置成功后失效所有旧 Token，写入审计日志，自动跳转登录页。15 分钟内未完成则会话过期。","priority":"P0","complexity":"M","linkedPages":["Screen/ResetPassword","H5/ResetPassword"],"acceptanceCriteria":["Password reset updates credential and invalidates sessions"],"acceptanceCriteria_zh":["新密码须符合密码规则","确认密码不一致时提示「Passwords do not match」","新密码与旧密码相同时提示","重置成功后跳转登录页","15 分钟超时后提示会话过期"]},{"id":"F-AUTH-015","title":"Login State Persistence (JWT)","title_zh":"登录态保持（JWT 双 Token）","description":"JWT-based session management with access and refresh tokens","description_zh":"采用 JWT 双 Token 方案维持登录态。access_token 短期有效（15 分钟）不落库，refresh_token 长期有效存储在服务端。勾选 Remember Me 时 refresh_token 30 天有效期，未勾选为会话级。Cookie 设置 HttpOnly + Secure + SameSite=Lax。","priority":"P0","complexity":"M","linkedPages":["Screen/Login","H5/Login"],"acceptanceCriteria":["Token management works as specified"],"acceptanceCriteria_zh":["勾选 Remember Me 后 refresh_token 30 天有效","未勾选时浏览器关闭后失效","Cookie 属性正确设置（HttpOnly、Secure、SameSite=Lax）","access_token 不落库"]},{"id":"F-AUTH-016","title":"Returning User Login Page","title_zh":"回访用户登录页","description":"Personalized login page for returning users","description_zh":"回访用户（之前勾选 Remember Me 且 Cookie 有效期内但 Token 过期）展示个性化登录页：用户首字母头像（72×72px，紫色背景 #F0EAFF）、「Welcome back, {用户名}」标题、预显示邮箱、无邮箱输入框、无 OAuth 按钮。提供「Not you? Use another account」链接切换标准登录页。","priority":"P1","complexity":"M","linkedPages":["Screen/Login-Remembered","H5/Login-Remembered"],"acceptanceCriteria":["Returning users see personalized login page"],"acceptanceCriteria_zh":["回访用户显示头像和用户名","邮箱已预显示，无需重新输入","密码输入框自动获取焦点","「Use another account」可切换到标准登录页"]},{"id":"F-AUTH-017","title":"Active Logout","title_zh":"主动退出","description":"User-initiated logout with confirmation dialog","description_zh":"用户主动退出登录，弹出确认弹窗（420×260px，圆角 16px），包含「Sign Out」标题、确认文案、「Yes, Sign Out」主按钮和「Cancel」次按钮。确认后清除 Session/Token（含 refresh_token），跳转首页。退出请求失败时前端强制清除本地 Token。","priority":"P0","complexity":"S","linkedPages":["Screen/LogoutModal","H5/LogoutModal"],"acceptanceCriteria":["Logout confirmation and session cleanup works"],"acceptanceCriteria_zh":["点击退出弹出确认弹窗","确认后清除所有 Token 和 Cookie","退出后跳转首页","点击 Cancel 关闭弹窗"]},{"id":"F-AUTH-018","title":"Logout Entry Point","title_zh":"退出入口","description":"Logout button placement in UI","description_zh":"PC 端退出入口位于页面右上角用户头像下拉菜单中的「Sign Out」选项。H5 端退出入口位于「我的」页面底部「Sign Out」按钮。","priority":"P0","complexity":"S","linkedPages":[],"acceptanceCriteria":["Logout entry point is discoverable"],"acceptanceCriteria_zh":["PC 端用户头像下拉菜单包含「Sign Out」","H5 端「我的」页面底部有「Sign Out」按钮"]},{"id":"F-AUTH-019","title":"Post-Logout Redirect Rules","title_zh":"退出跳转规则","description":"Redirect logic after logout based on different scenarios","description_zh":"退出后跳转规则：主动退出跳转首页；Session 过期跳转首页并显示「Session expired」提示；安全强制退出跳转首页并显示对应提示；协议版本更新拒绝同意强制退出。","priority":"P0","complexity":"S","linkedPages":[],"acceptanceCriteria":["Correct redirect after various logout scenarios"],"acceptanceCriteria_zh":["主动退出后跳转首页","Session 过期后跳转首页并显示提示","安全强制退出跳转首页并显示提示"]},{"id":"F-AUTH-020","title":"Logout Feedback","title_zh":"退出反馈","description":"User feedback throughout logout flow","description_zh":"退出操作全流程有明确用户反馈：点击退出弹出确认弹窗，确认退出中按钮显示 loading 状态，退出成功跳转首页，退出失败 Toast 提示「Sign out failed, please try again」。","priority":"P1","complexity":"S","linkedPages":["Screen/LogoutModal","H5/LogoutModal"],"acceptanceCriteria":["Logout feedback is clear at each step"],"acceptanceCriteria_zh":["确认退出时按钮显示 loading","退出失败时显示 Toast 提示"]},{"id":"F-AUTH-021","title":"Account Deletion","title_zh":"账号注销","description":"Permanent account deletion with identity verification","description_zh":"用户主动发起永久删除账号操作。有密码用户需输入密码验证，仅 OAuth 用户需重新 OAuth 授权验证。页面包含红色警告区域、密码确认输入框和「Permanently delete account」红色按钮。注销后 30 天冷静期可联系客服恢复，数据按保留策略处理（交易记录永久保留脱敏、个人信息 30 天后物理删除）。","priority":"P1","complexity":"L","linkedPages":["Screen/AccountDeletion","H5/AccountDeletion"],"acceptanceCriteria":["Account deletion with verification and cooling period"],"acceptanceCriteria_zh":["有密码用户需输入密码验证","OAuth 用户需重新授权验证","存在活跃订单时按钮置灰并提示","注销后清除所有 Token 和 Cookie","30 天冷静期内可联系客服恢复"]},{"id":"F-AUTH-022","title":"Change Password (Logged In)","title_zh":"密码修改（登录态）","description":"Logged-in user changes current password","description_zh":"已登录用户主动修改密码。需先验证旧密码，新密码不能与旧密码相同。修改成功后除当前 Session 外的所有 Session 立即失效，其他设备需重新登录。仅 OAuth 注册用户（无密码）无此功能入口。","priority":"P1","complexity":"M","linkedPages":["Screen/ChangePassword"],"acceptanceCriteria":["Password change invalidates other sessions"],"acceptanceCriteria_zh":["旧密码验证正确后可输入新密码","新旧密码相同时提示","修改成功后其他设备 Session 失效","仅有密码的用户可见此功能"]},{"id":"F-AUTH-023","title":"Token Refresh","title_zh":"Token 刷新","description":"Auto-refresh access_token using refresh_token","description_zh":"access_token 过期时自动使用 refresh_token 换取新 access_token，实现无感续期。refresh_token 无效或 Session 已吊销时返回 401，前端清除 Token 跳转首页提示重新登录。每次刷新时 refresh_token 滑动续期。","priority":"P0","complexity":"M","linkedPages":[],"acceptanceCriteria":["Token refresh is seamless for active users"],"acceptanceCriteria_zh":["access_token 过期后自动刷新，用户无感","refresh_token 无效时跳转首页提示登录","每次刷新时 refresh_token 滑动续期"]},{"id":"F-AUTH-024","title":"Session Invalidation (Passive Logout)","title_zh":"会话失效（被动退出）","description":"Automatic session handling when login state becomes invalid","description_zh":"登录会话失效时自动处理：Token 自然过期、密码被修改、管理员强制下线、账号被锁定等场景。前端尝试 Token 刷新失败后清除本地存储，跳转首页展示「Session expired. Please sign in again.」提示，登录成功后尝试恢复之前的页面。","priority":"P0","complexity":"S","linkedPages":[],"acceptanceCriteria":["Expired sessions redirect to home with message"],"acceptanceCriteria_zh":["Session 过期后自动跳转首页","显示「Session expired」提示","重新登录后恢复之前访问的页面"]},{"id":"F-AUTH-025","title":"Consent Version Check","title_zh":"协议版本检测","description":"Detect and prompt for updated terms when user visits any page","description_zh":"用户访问任意页面时检测协议版本变化。有更新则弹窗要求确认，同意后写入 ConsentRecord（记录版本号 + 国家），拒绝则强制退出登录。协议版本号存储在服务端配置，前端每次页面加载时调用接口检查（可缓存）。","priority":"P1","complexity":"M","linkedPages":["Screen/ConsentUpdateModal"],"acceptanceCriteria":["Consent update modal appears when terms are updated"],"acceptanceCriteria_zh":["协议版本更新时弹出确认弹窗","同意后正常访问页面","拒绝后强制退出登录"]},{"id":"F-AUTH-026","title":"Risk Control Detection","title_zh":"风控检测规则","description":"Device fingerprint and IP-based risk detection for key auth operations","description_zh":"在注册、登录、OAuth 认证等关键节点执行风控检测。5 项检测规则：设备指纹识别、信任设备判断（前期简化）、IP 地理位置异常（跨州验证码、跨国拦截）、暴力破解检测（同 IP 10分钟内≥10次触发 CAPTCHA 30分钟）、综合风险评估。高风险拦截展示独立页面含客服邮箱链接。","priority":"P0","complexity":"L","linkedPages":["Screen/RiskBlocked","H5/RiskBlocked","Screen/VerifyCode-CrossStateLogin","H5/VerifyCode-CrossStateLogin"],"acceptanceCriteria":["Risk detection rules are enforced"],"acceptanceCriteria_zh":["未知设备创建记录","跨州 IP 触发邮箱验证码","跨国 IP 直接拦截并展示拦截页","同 IP 10 分钟内≥10 次触发 CAPTCHA","拦截页提供客服邮箱链接"]},{"id":"F-AUTH-027","title":"Password Security Validation","title_zh":"密码安全校验","description":"Real-time password strength validation","description_zh":"对用户设置的密码进行安全性校验：最少 8 字符、至少 1 个大写字母、至少 1 个小写字母、至少 1 个数字。实时逐条显示通过/未通过状态，全部通过后提交按钮可点击。应用于注册、忘记密码重置和登录态修改密码三个场景。","priority":"P0","complexity":"S","linkedPages":["Screen/Register","Screen/ResetPassword","Screen/ChangePassword","H5/Register","H5/ResetPassword"],"acceptanceCriteria":["Password rules are validated in real-time"],"acceptanceCriteria_zh":["实时显示每条规则的通过/未通过状态","全部通过后按钮可点击"]},{"id":"F-AUTH-028","title":"Login Attempt Limit","title_zh":"登录限错","description":"Account lockout after failed login attempts","description_zh":"限制登录密码错误次数防止暴力破解。同一账号连续输错 5 次锁定 30 分钟，锁定期间提示「Account locked. Too many failed attempts. Please try again in 30 minutes.」锁定到期自动解锁，登录成功 const MODULE_DEFS = [
  { key: 'REG', label: '注册', seqs: ['001','002','003','004','005','006','007','008','009','010'] },
  { key: 'LOGIN', label: '登录', seqs: ['011','012','013','014','015','016'] },
  { key: 'LOGOUT', label: '退出', seqs: ['017','018','019','020','021'] },
  { key: 'SESSION', label: '密码与会话', seqs: ['022','023','024','025'] },
  { key: 'RISK', label: '安全风控', seqs: ['026','027','028','029','030','031'] },
  { key: 'COMMON', label: '公共', seqs: ['032'] }
];

function getModule(fid) {
  var seq = fid.split('-').pop();
  return MODULE_DEFS.find(function(m) { return m.seqs.indexOf(seq) !== -1; }) || { key: 'OTHER', label: '其他' };
}

function priorityColor(p) {
  return p === 'P0' ? 'var(--red)' : p === 'P1' ? 'var(--orange)' : 'var(--blue)';
}
function priorityBg(p) {
  return p === 'P0' ? 'var(--red-bg)' : p === 'P1' ? 'var(--orange-bg)' : 'var(--blue-bg)';
}
function severityLabel(s) {
  return ({critical:'严重',warning:'警告',info:'提示'})[s] || s;
}
function coverageColor(pct) {
  return pct >= 90 ? 'var(--green)' : pct >= 80 ? 'var(--orange)' : 'var(--red)';
}
function coverageClass(pct) {
  return pct >= 90 ? 'green' : pct >= 80 ? 'orange' : 'red';
}

/* ===== Dashboard ===== */
document.getElementById('meta').textContent = DATA.run_id + ' \u00b7 ' + DATA.requirement_name + ' ' + DATA.requirement_version + ' \u00b7 ' + new Date(DATA.generated_at).toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});

var statDefs = [
  ['功能点', DATA.metrics.feature_count],
  ['用户故事', DATA.metrics.user_story_count],
  ['设计页面', DATA.metrics.page_count],
  ['覆盖度', DATA.metrics.coverage + '%'],
  ['冲突项', DATA.metrics.conflict_count]
];
document.getElementById('stats').innerHTML = statDefs.map(function(s) {
  return '<div class="stat-card"><div class="value">' + s[1] + '</div><div class="label">' + s[0] + '</div></div>';
}).join('');

/* ===== Coverage ===== */
var cov = DATA.coverage;
var covPct = cov.coverage_pct;
var featuresNoDesign = cov.features_no_design_needed || 0;
document.getElementById('coverage-summary').innerHTML = '<div style="font-size:14px;font-weight:600">UI 功能点覆盖度 <span style="color:' + coverageColor(covPct) + ';font-size:22px;margin-left:4px">' + covPct + '%</span></div>' +
  '<div style="font-size:12px;color:var(--text2);margin-top:4px">' + cov.features_with_design + ' / ' + cov.total_features + ' 个功能点有关联设计页' + (featuresNoDesign ? '（其中 ' + featuresNoDesign + ' 个无需独立设计页）' : '') + '</div>';

var pf = document.getElementById('progress-fill');
pf.style.width = covPct + '%';
pf.className = 'progress-fill ' + coverageClass(covPct);
document.getElementById('progress-pct').textContent = cov.features_with_design + ' / ' + cov.total_features + ' 个功能点已覆盖';

/* Module table */
var tbody = document.querySelector('#module-table tbody');
MODULE_DEFS.forEach(function(mod) {
  var feats = DATA.features.filter(function(f) { return mod.seqs.indexOf(f.id.split('-').pop()) !== -1; });
  var p0 = feats.filter(function(f) { return f.priority === 'P0'; }).length;
  var p1 = feats.filter(function(f) { return f.priority === 'P1'; }).length;
  var p2 = feats.filter(function(f) { return f.priority === 'P2'; }).length;
  var withDesign = feats.filter(function(f) { return f.linkedPages && f.linkedPages.length > 0; }).length;
  var pct = feats.length ? Math.round(withDesign / feats.length * 100) : 0;
  var color = coverageColor(pct);
  tbody.innerHTML += '<tr><td style="font-weight:600">' + mod.label + '</td><td>' + p0 + '</td><td>' + p1 + '</td><td>' + p2 + '</td><td>' + feats.length + '</td><td>' + withDesign + ' / ' + feats.length + '</td><td style="color:' + color + ';font-weight:600">' + pct + '%</td></tr>';
});

/* Unmatched pages & features without design */
var unmatchedHtml = '';
if (cov.unmatched_pages && cov.unmatched_pages.length > 0) {
  unmatchedHtml += '<div style="margin-top:16px;font-size:13px"><div style="font-weight:600;margin-bottom:8px;color:var(--orange)">未关联功能点的设计页（' + cov.unmatched_pages.length + ' 个）</div>' + cov.unmatched_pages.map(function(p) { return '<span class="page-chip" style="background:var(--orange-bg);color:var(--orange)">' + p + '</span>'; }).join('') + '</div>';
}
var noDesign = DATA.features.filter(function(f) { return !f.linkedPages || f.linkedPages.length === 0; });
if (noDesign.length > 0) {
  unmatchedHtml += '<div style="margin-top:16px;font-size:13px"><div style="font-weight:600;margin-bottom:8px;color:var(--text3)">无独立设计页的功能点（' + noDesign.length + ' 个）</div>' + noDesign.map(function(f) { return '<span class="page-chip" style="background:var(--bg);color:var(--text2)">' + f.id + ' ' + f.title_zh + '</span>'; }).join('') + '</div>';
}
document.getElementById('unmatched-list').innerHTML = unmatchedHtml;

/* ===== Conflicts ===== */
var severityBadge = DATA.metrics.conflicts_by_severity;
var badgeText = [];
if (severityBadge.critical > 0) badgeText.push(severityBadge.critical + ' 严重');
if (severityBadge.warning > 0) badgeText.push(severityBadge.warning + ' 警告');
if (severityBadge.info > 0) badgeText.push(severityBadge.info + ' 提示');
document.getElementById('conflict-badge').textContent = DATA.metrics.conflict_count + ' 项（' + badgeText.join('、') + '）';
document.getElementById('conflict-badge').className = 'badge ' + (severityBadge.critical > 0 ? 'critical' : severityBadge.warning > 0 ? 'warning' : 'info');

var cf = DATA.conflicts.slice().sort(function(a,b) { var o={critical:0,warning:1,info:2}; return o[a.severity]-o[b.severity]; });
document.getElementById('conflicts').innerHTML = cf.map(function(c) {
  var items = (c.affectedItems || []).map(function(i) { return '<span class="chip">' + i + '</span>'; }).join('');
  return '<div class="conflict-card ' + c.severity + '"><div class="conflict-header"><span class="conflict-type">' + c.type_zh + '</span><span class="badge ' + c.severity + '">' + severityLabel(c.severity) + '</span></div><div class="conflict-desc">' + c.description + '</div>' + (items ? '<div class="conflict-items">' + items + '</div>' : '') + '</div>';
}).join('');

/* ===== Features ===== */
var pCounts = {P0:0,P1:0,P2:0};
DATA.features.forEach(function(f) { pCounts[f.priority] = (pCounts[f.priority]||0) + 1; });
document.getElementById('priority-tags').innerHTML = ['P0','P1','P2'].map(function(p) { return pCounts[p] ? '<span class="p-tag ' + p + '">' + p + ' \u00b7 ' + pCounts[p] + '</span>' : ''; }).join('');

document.getElementById('module-filters').innerHTML = MODULE_DEFS.map(function(m) {
  return '<button class="filter-btn" onclick="filterModule(\'' + m.key + '\')">' + m.label + '</button>';
}).join('');

var currentFilter = 'all';
var currentSearch = '';

function renderFeatures() {
  var el = document.getElementById('features');
  var feats = DATA.features;
  if (currentFilter !== 'all') {
    var mod = MODULE_DEFS.find(function(m) { return m.key === currentFilter; });
    if (mod) feats = feats.filter(function(f) { return mod.seqs.indexOf(f.id.split('-').pop()) !== -1; });
  }
  if (currentSearch) {
    var q = currentSearch.toLowerCase();
    feats = feats.filter(function(f) {
      return (f.title_zh||'').toLowerCase().indexOf(q) !== -1 ||
             (f.description_zh||'').toLowerCase().indexOf(q) !== -1 ||
             f.id.toLowerCase().indexOf(q) !== -1;
    });
  }
  if (feats.length === 0) {
    el.innerHTML = '<div class="empty-msg">没有匹配的功能点</div>';
    return;
  }
  el.innerHTML = feats.map(function(f) {
    var pages = (f.linkedPages||[]).map(function(p) {
      var isH5 = p.indexOf('H5/') === 0;
      return '<span class="page-chip" style="' + (isH5 ? 'background:var(--green-bg);color:var(--green)' : '') + '">' + p + '</span>';
    }).join('');
    var acs = (f.acceptanceCriteria_zh||[]).map(function(a) { return '<li>' + a + '</li>'; }).join('');
    return '<div class="feature-card" data-id="' + f.id + '">' +
      '<div class="feature-header" onclick="toggleFeature(this)">' +
        '<span class="feature-id">' + f.id + '</span>' +
        '<span class="feature-title">' + f.title_zh + '</span>' +
        '<span class="feature-priority" style="background:' + priorityBg(f.priority) + ';color:' + priorityColor(f.priority) + '">' + f.priority + '</span>' +
        '<span class="feature-complexity">' + f.complexity + '</span>' +
        '<span class="feature-arrow">\u25B6</span>' +
      '</div>' +
      '<div class="feature-body">' +
        '<div class="desc">' + f.description_zh + '</div>' +
        (pages ? '<div class="pages-label">关联设计页</div>' + pages : '<div class="pages-label" style="color:var(--text3)">无独立设计页（纯后端 / 内嵌逻辑）</div>') +
        (acs ? '<div class="pages-label" style="margin-top:12px">验收标准</div><ol class="ac-list">' + acs + '</ol>' : '') +
      '</div></div>';
  }).join('');
}

function filterModule(key) {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  if (key === 'all') {
    document.querySelector('.filter-btn').classList.add('active');
  } else {
    var mod = MODULE_DEFS.find(function(m) { return m.key === key; });
    document.querySelectorAll('.filter-btn').forEach(function(b) {
      if (mod && b.textContent === mod.label) b.classList.add('active');
    });
  }
  renderFeatures();
}

function searchFeatures(q) { currentSearch = q; renderFeatures(); }

function toggleFeature(header) {
  var body = header.nextElementSibling;
  var arrow = header.querySelector('.feature-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

renderFeatures();

/* ===== User Stories ===== */
document.getElementById('stories').innerHTML = DATA.userStories.map(function(s) {
  return '<tr><td style="font-weight:600;color:var(--purple);white-space:nowrap">' + s.id + '</td><td>作为 ' + s.role_zh + '</td><td>我希望 ' + s.action_zh + '</td><td>以便 ' + s.benefit_zh + '</td></tr>';
}).join('');

/* ===== Tokens ===== */
var colors = DATA.tokens.colors || {};
var colorKeys = Object.keys(colors);
var radiusKeys = Object.keys(DATA.tokens.borderRadius || {});
var spacingKeys = Object.keys(DATA.tokens.spacing || {});
var totalTokens = colorKeys.length + radiusKeys.length + spacingKeys.length;

document.getElementById('tokens-summary').innerHTML = '共 ' + totalTokens + ' 个 Design Token（' + colorKeys.length + ' 个颜色变量 · ' + radiusKeys.length + ' 个圆角 · ' + spacingKeys.length + ' 个间距）';

document.getElementById('color-tokens').innerHTML = colorKeys.map(function(k) {
  return '<div class="token-card"><div class="color-swatch" style="background:' + colors[k] + '"></div><div class="name">' + k + '</div><div class="val">' + colors[k] + '</div></div>';
}).join('');

document.getElementById('radius-tokens').innerHTML = radiusKeys.map(function(k) {
  var v = DATA.tokens.borderRadius[k];
  return '<div class="token-card"><div class="name">radius-' + k + '</div><div class="val">' + v + '</div></div>';
}).join('');

document.getElementById('spacing-tokens').innerHTML = spacingKeys.map(function(k) {
  var v = DATA.tokens.spacing[k];
  return '<div class="token-card"><div class="name">spacing-' + k + '</div><div class="val">' + v + '</div></div>';
}).join('');

/* ===== Design Pages ===== */
var pcPages = DATA.designPages.pc || [];
var h5Pages = DATA.designPages.h5 || [];
var homePc = DATA.designPages.home_pc || [];
var homeH5 = DATA.designPages.home_h5 || [];

function renderPageItem(p, isH5) {
  var displayName = p.name;
  var cls = isH5 ? ' h5' : '';
  var sizeHtml = p.size ? '<div class="page-size">' + p.size + '</div>' : '';
  return '<div class="page-item' + cls + '"><strong>' + displayName + '</strong>' + sizeHtml + '</div>';
}

var pcHtml = pcPages.map(function(p) { return renderPageItem(p, false); }).join('');
if (homePc.length > 0) {
  pcHtml += '<div style="margin-top:16px;font-size:13px;font-weight:600;color:var(--text3);margin-bottom:8px">首页方案</div>';
  pcHtml += homePc.map(function(p) { return renderPageItem(p, false); }).join('');
}
document.getElementById('pc-pages').innerHTML = pcHtml || '<div class="empty-msg">暂无 PC 端设计页面</div>';

var h5Html = h5Pages.map(function(p) { return renderPageItem(p, true); }).join('');
if (homeH5.length > 0) {
  h5Html += '<div style="margin-top:16px;font-size:13px;font-weight:600;color:var(--text3);margin-bottom:8px">首页方案</div>';
  h5Html += homeH5.map(function(p) { return renderPageItem(p, true); }).join('');
}
document.getElementById('h5-pages').innerHTML = h5Html || '<div class="empty-msg">暂无 H5 端设计页面</div>';
</script>
</body>
</html>
