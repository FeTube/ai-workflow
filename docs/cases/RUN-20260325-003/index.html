<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

}

    --primary-light:#2E1065;--shadow:0 1px 3px rgba(0,0,0,.3);
  }
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:0}
a{color:var(--primary);text-decoration:none}
/* Dashboard */
.dashboard{background:linear-gradient(135deg,#6432FC 0%,#4F46E5 100%);color:#fff;padding:32px 40px;display:flex;gap:32px;align-items:center;flex-wrap:wrap}
.dashboard h1{font-size:24px;font-weight:700;margin-bottom:4px}
.dashboard .meta{font-size:13px;opacity:.85}
.stats{display:flex;gap:16px;margin-left:auto}
.stat-card{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:var(--radius);padding:12px 20px;text-align:center;min-width:80px}
.stat-card .num{font-size:28px;font-weight:700}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.chart-wrap{width:120px;height:120px;position:relative}
.chart-wrap canvas{width:100%!important;height:100%!important}
.chart-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.chart-center .num{font-size:28px;font-weight:700}
.chart-center .label{font-size:10px;opacity:.7}
/* Controls */
.controls{padding:16px 40px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:4px}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:.15s}
.tab:hover{border-color:var(--primary);color:var(--primary)}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.priority-filters{display:flex;gap:4px}
.pf{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:.15s;opacity:.5}
.pf:hover,.pf.active{opacity:1}
.pf[data-p="P0"]{background:#FEE2E2;color:var(--p0)}.pf[data-p="P0"].active{border-color:var(--p0)}
.pf[data-p="P1"]{background:#FEF3C7;color:#B45309}.pf[data-p="P1"].active{border-color:var(--p1)}
.pf[data-p="P2"]{background:#DBEAFE;color:var(--p2)}.pf[data-p="P2"].active{border-color:var(--p2)}
.pf[data-p="P3"]{background:#F1F5F9;color:var(--p3)}.pf[data-p="P3"].active{border-color:var(--p3)}
.type-filters{display:flex;gap:4px}
.tf{padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);transition:.15s}
.tf:hover,.tf.active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.status-filters{display:flex;gap:4px}
.sf{padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);transition:.15s;display:flex;align-items:center;gap:4px}
.sf:hover,.sf.active{border-color:var(--primary);color:var(--primary)}
.sf .dot{width:8px;height:8px;border-radius:50%}
.sf[data-s="pending"] .dot{background:var(--pending)}
.sf[data-s="pass"] .dot{background:var(--pass)}
.sf[data-s="fail"] .dot{background:var(--fail)}
.platform-filters{display:flex;gap:4px}
.plf{padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);transition:.15s}
.plf:hover,.plf.active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.search{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);width:200px;outline:none;transition:.15s}
.search:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(100,50,252,.1)}
.btn-export{margin-left:auto;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:.15s}
.btn-export:hover{border-color:var(--primary);color:var(--primary)}
/* Main */
.main{padding:24px 40px;max-width:1400px;margin:0 auto}
.case-count{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.cards{display:flex;flex-direction:column;gap:12px}
/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.2s}

.card-header{display:flex;align-items:center;gap:10px;padding:14px 20px;cursor:pointer;user-select:none}
.card-id{font-size:11px;font-weight:700;font-family:monospace;background:var(--primary-light);color:var(--primary);padding:3px 8px;border-radius:4px;white-space:nowrap}
.card-title{font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-p0{background:#FEE2E2;color:var(--p0)}.badge-p1{background:#FEF3C7;color:#B45309}
.badge-p2{background:#DBEAFE;color:var(--p2)}.badge-p3{background:#F1F5F9;color:var(--p3)}
.badge-type{background:var(--bg);color:var(--text-secondary);border:1px solid var(--border);font-weight:400}
.platform-icons{display:flex;gap:4px}
.platform-icon{font-size:11px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text-secondary);border:1px solid var(--border)}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.pending{background:var(--pending)}.status-dot.pass{background:var(--pass)}.status-dot.fail{background:var(--fail)}
.chevron{font-size:18px;color:var(--text-secondary);transition:.2s;flex-shrink:0}
.card.open .chevron{transform:rotate(90deg)}
.card-body{display:none;padding:0 20px 16px;border-top:1px solid var(--border)}
.card.open .card-body{display:block}
.preconditions{margin-top:12px}
.preconditions summary{font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;margin-bottom:6px}
.preconditions ul{list-style:disc;margin-left:20px;font-size:13px;color:var(--text-secondary)}
.steps-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.steps-table th{text-align:left;padding:8px 10px;background:var(--bg);font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border)}
.steps-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.steps-table td:first-child{width:40px;text-align:center;color:var(--text-secondary);font-weight:600}
.steps-table td:last-child{width:60px;text-align:center}
.step-status{font-size:11px;padding:2px 6px;border-radius:8px;font-weight:600}
.step-status.pending{background:#F1F5F9;color:var(--pending)}
.step-status.pass{background:#DCFCE7;color:#16A34A}
.step-status.fail{background:#FEE2E2;color:var(--fail)}
/* Flow & Issues */
.flow-and-issues{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border)}
@media(max-width:1024px){.flow-and-issues{grid-template-columns:1fr}}
.flow-panel,.issues-panel{padding:24px 40px;background:var(--card)}
.flow-panel{border-right:1px solid var(--border)}
@media(max-width:1024px){.flow-panel{border-right:none;border-bottom:1px solid var(--border)}}
.panel-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel-title .icon{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}

.flow-steps{display:flex;flex-direction:column;gap:0;position:relative}
.flow-step{display:flex;align-items:flex-start;gap:12px;position:relative}
.flow-step:not(:last-child){padding-bottom:16px}
.flow-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px}
.flow-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;position:relative;z-index:1}
.flow-dot.done{background:var(--pass)}.flow-dot.active{background:var(--primary);box-shadow:0 0 0 4px rgba(100,50,252,.2)}.flow-dot.pending{background:var(--pending)}
.flow-line{width:2px;flex:1;min-height:12px;margin:2px 0}
.flow-line.done{background:var(--pass)}.flow-line.active{background:var(--primary)}.flow-line.pending{background:var(--border)}
.flow-content{flex:1;padding-top:3px}
.flow-content .step-name{font-size:13px;font-weight:600;color:var(--text)}
.flow-content .step-detail{font-size:12px;color:var(--text-secondary);margin-top:2px}
.flow-content .step-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:6px}
.step-badge.pass{background:#DCFCE7;color:#16A34A}.step-badge.fail{background:#FEE2E2;color:var(--fail)}.step-badge.skip{background:#F1F5F9;color:var(--pending)}

.issue-list{display:flex;flex-direction:column;gap:10px}
.issue-card{display:flex;gap:12px;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);transition:.15s}
.issue-card:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.issue-severity{width:6px;border-radius:3px;flex-shrink:0}
.issue-severity.high{background:var(--fail)}.issue-severity.medium{background:var(--p1)}.issue-severity.low{background:var(--p2)}.issue-severity.info{background:var(--pending)}
.issue-body{flex:1;min-width:0}
.issue-title{font-size:13px;font-weight:600;color:var(--text)}
.issue-desc{font-size:12px;color:var(--text-secondary);margin-top:3px;line-height:1.5}
.issue-meta{display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--text-secondary)}
.issue-tag{padding:1px 6px;border-radius:4px;background:var(--card);border:1px solid var(--border);font-weight:500}
.no-issues{text-align:center;padding:24px;color:var(--pass);font-size:14px;font-weight:600}
.screenshots{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.screenshots-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.screenshots-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.breakpoints-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:768px){.breakpoints-grid{grid-template-columns:repeat(2,1fr)}}
.bp-item{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
.bp-item img{width:100%;height:auto;display:block;cursor:zoom-in}
.screenshot-item{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg)}
.screenshot-label{font-size:11px;font-weight:600;color:var(--text-secondary);padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.screenshot-item img{width:100%;height:auto;display:block;cursor:zoom-in}
.diff-pct{font-weight:700;padding:1px 6px;border-radius:8px;font-size:10px}
.ui-score-bar{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12px;font-weight:600;color:var(--text-secondary)}
.score-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.score-fill{height:100%;border-radius:4px;transition:width .3s}
.score-num{font-size:18px;font-weight:700;color:var(--text);min-width:30px;text-align:right}
.platform-notes{margin-top:8px;border-top:1px dashed var(--border);padding-top:6px}
.pn-row{display:flex;gap:8px;margin-top:4px;font-size:12px;line-height:1.4}
.pn-label{flex-shrink:0;font-weight:600;color:var(--primary);background:var(--primary-light);padding:1px 6px;border-radius:4px;font-size:11px;white-space:nowrap;height:fit-content}
.pn-text{color:var(--text-secondary)}
.card-footer{display:flex;align-items:center;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-secondary)}
.fail-reason{margin-top:8px;padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;font-size:13px;color:#991B1B}
/* Coverage Matrix */
.matrix-section{margin-top:40px}
.matrix-section h2{font-size:18px;font-weight:700;margin-bottom:16px}
.matrix{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);font-size:13px}
.matrix th,.matrix td{padding:10px 14px;border:1px solid var(--border);text-align:center}
.matrix th{background:var(--bg);font-weight:600;font-size:12px;color:var(--text-secondary)}
.matrix td:first-child{text-align:left;font-weight:600}
.matrix .cell-0{color:var(--text-secondary)}.matrix .cell-pos{color:var(--text);font-weight:600}
/* Responsive */
@media(max-width:1024px){.dashboard{padding:24px}.controls,.main{padding:16px 24px}}
@media(max-width:768px){
  .dashboard{flex-direction:column;align-items:flex-start;padding:20px}
  .stats{margin-left:0;flex-wrap:wrap}
  .controls{gap:8px;padding:12px 16px}
  .main{padding:12px 16px}
  .search{width:100%}
  .btn-export{margin-left:0;width:100%}
  .card-title{white-space:normal}
}
</style>
</head>

/* ── Flatten ── */
function allCases(){
  const out = [];
  DATA.modules.forEach(m => m.cases.forEach(c => out.push({...c, module: m.name, module_display: m.display_name})));
  return out;
}
const ALL = allCases();

function drawPie(){
  const canvas = document.getElementById('pieChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 120 * dpr; canvas.height = 120 * dpr;
  ctx.scale(dpr, dpr);
  const s = DATA.summary;
  const data = [{v:s.P0,c:'#EF4444'},{v:s.P1,c:'#F59E0B'},{v:s.P2,c:'#3B82F6'},{v:s.P3,c:'#9CA3AF'}];
  const total = data.reduce((a,d)=>a+d.v,0);
  let angle = -Math.PI/2;
  const cx=60,cy=60,r=54,ir=36;
  data.forEach(d=>{
    const slice = (d.v/total)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.arc(cx,cy,ir,angle+slice,angle,true);
    ctx.closePath();
    ctx.fillStyle=d.c;
    ctx.fill();
    angle+=slice;
  });
}

/* ── Controls ── */
function renderControls(){
  const modules = [{name:'all',display_name:'全部'},...DATA.modules];
  const types = ['happy_path','edge_case','error','cross_platform'];
  const typeLabels = {happy_path:'正向',edge_case:'边界',error:'异常',cross_platform:'跨端'};
  const statuses = ['pending','pass','fail'];
  const statusLabels = {pending:'待执行',pass:'通过',fail:'失败'};

  let html = '<div class="tabs">';
  modules.forEach(m=>{
    html += `<button class="tab${activeModule===m.name?' active':''}" data-mod="${m.name}">${m.display_name}</button>`;
  });
  html += '</div><div class="priority-filters">';
  ['P0','P1','P2','P3'].forEach(p=>{
    html += `<button class="pf${activePriorities.has(p)?' active':''}" data-p="${p}">${p}</button>`;
  });
  html += '</div><div class="type-filters">';
  types.forEach(t=>{
    html += `<button class="tf${activeTypes.has(t)?' active':''}" data-t="${t}">${typeLabels[t]}</button>`;
  });
  html += '</div><div class="platform-filters">';
  const platforms = ['web','ios','android'];
  const platformLabels = {web:'🖥 Web',ios:' iOS',android:'🤖 Android'};
  platforms.forEach(p=>{
    html += `<button class="plf${activePlatforms.has(p)?' active':''}" data-pl="${p}">${platformLabels[p]}</button>`;
  });
  html += '</div><div class="status-filters">';
  statuses.forEach(s=>{
    html += `<button class="sf${activeStatuses.has(s)?' active':''}" data-s="${s}"><span class="dot"></span>${statusLabels[s]}</button>`;
  });
  html += '</div>';
  html += `<input class="search" type="text" placeholder="搜索 ID / 标题 / 步骤..." value="${searchQuery}">`;
  html += '<button class="btn-export" id="exportBtn">导出 CSV</button>';
  document.getElementById('controls').innerHTML = html;

  /* Events */
  document.querySelectorAll('.tab').forEach(el=>el.onclick=()=>{activeModule=el.dataset.mod;render()});
  document.querySelectorAll('.pf').forEach(el=>el.onclick=()=>{
    const p=el.dataset.p; activePriorities.has(p)?activePriorities.delete(p):activePriorities.add(p); render();
  });
  document.querySelectorAll('.tf').forEach(el=>el.onclick=()=>{
    const t=el.dataset.t; activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t); render();
  });
  document.querySelectorAll('.plf').forEach(el=>el.onclick=()=>{
    const p=el.dataset.pl; activePlatforms.has(p)?activePlatforms.delete(p):activePlatforms.add(p); render();
  });
  document.querySelectorAll('.sf').forEach(el=>el.onclick=()=>{
    const s=el.dataset.s; activeStatuses.has(s)?activeStatuses.delete(s):activeStatuses.add(s); render();
  });
  document.querySelector('.search').oninput=e=>{searchQuery=e.target.value.toLowerCase();renderCards()};
  document.getElementById('exportBtn').onclick=exportCSV;
}

/* ── Filter ── */
function filtered(){
  return ALL.filter(c=>{
    if(activeModule!=='all' && c.module!==activeModule) return false;
    if(activePriorities.size && !activePriorities.has(c.priority)) return false;
    if(activeTypes.size && !activeTypes.has(c.type)) return false;
    if(activeStatuses.size && !activeStatuses.has(c.status)) return false;
    if(activePlatforms.size && !c.platforms.some(p=>activePlatforms.has(p))) return false;
    if(searchQuery){
      const q=searchQuery;
      const haystack = (c.id+' '+c.title+' '+c.steps.map(s=>s.action+' '+s.expected).join(' ')).toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });
}

              pnotes = '<div class="platform-notes">' + entries.map(([p,note])=>{
                const icon = {web:'🖥',ios:'',android:'🤖'}[p]||'';
                const label = {web:'Web',ios:'iOS',android:'Android'}[p]||p;
                return '<div class="pn-row"><span class="pn-label">'+icon+' '+label+'</span><span class="pn-text">'+note+'</span></div>';
              }).join('') + '</div>';
            }
            return '<tr><td>'+s.seq+'</td><td>'+s.action+'</td><td>'+s.expected+pnotes+'</td><td><span class="step-status '+c.status+'">'+(c.status==='pending'?'—':c.status==='pass'?'✓':'✗')+'</span></td></tr>';
          }).join('')}</tbody>
        </table>
        ${c.fail_reason?`<div class="fail-reason">${c.fail_reason}</div>`:''}
        ${c.screenshots?`<div class="screenshots">
          <div class="screenshots-title">UI 验证截图</div>
          ${c.screenshots.breakpoints?`<div class="breakpoints-grid">${c.screenshots.breakpoints.map(bp=>`<div class="bp-item"><div class="screenshot-label">${bp.label} <span style="opacity:.6">${bp.width}px</span></div><img src="${bp.image}" alt="${bp.width}px" loading="lazy"></div>`).join('')}</div>`
          :`<div class="screenshots-grid">
            ${c.screenshots.baseline?`<div class="screenshot-item">
              <div class="screenshot-label">设计基线</div>
              <img src="${c.screenshots.baseline}" alt="Design baseline" loading="lazy">
            </div>`:''}
            ${c.screenshots.actual?`<div class="screenshot-item">
              <div class="screenshot-label">实际实现</div>
              <img src="${c.screenshots.actual}" alt="Actual implementation" loading="lazy">
            </div>`:''}
            ${c.screenshots.diff?`<div class="screenshot-item">
              <div class="screenshot-label">差异对比 <span class="diff-pct">${c.screenshots.diff_pct||''}</span></div>
              <img src="${c.screenshots.diff}" alt="Diff" loading="lazy">
            </div>`:''}
          </div>`}
          ${c.screenshots.score!=null?`<div class="ui-score-bar">
            <span>还原度评分</span>
            <div class="score-track"><div class="score-fill" style="width:${c.screenshots.score}%;background:${c.screenshots.score>=90?'var(--pass)':c.screenshots.score>=80?'var(--p1)':'var(--fail)'}"></div></div>
            <span class="score-num">${c.screenshots.score}</span>
          </div>`:''}
        </div>`:''}
        <div class="card-footer">
          <span>关联需求: <a href="#">${c.linked_requirement}</a></span>
          <span>模块: ${c.module_display}</span>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('cards').innerHTML = html;
  /* Toggle */
  document.querySelectorAll('.card-header').forEach(el=>el.onclick=()=>el.parentElement.classList.toggle('open'));
}

/* ── Matrix ── */
function renderMatrix(){
  const priorities = ['P0','P1','P2','P3'];
  const modules = DATA.modules;
  let html = '<h2>覆盖率矩阵（模块 × 优先级）</h2><table class="matrix"><thead><tr><th>模块</th>';
  priorities.forEach(p=>html+=`<th>${p}</th>`);
  html += '<th>合计</th></tr></thead><tbody>';
  let totals = {P0:0,P1:0,P2:0,P3:0,all:0};
  modules.forEach(m=>{
    html += `<tr><td>${m.display_name}</td>`;
    let rowTotal = 0;
    priorities.forEach(p=>{
      const count = m.cases.filter(c=>c.priority===p).length;
      totals[p] += count; rowTotal += count;
      html += `<td class="${count?'cell-pos':'cell-0'}">${count||'—'}</td>`;
    });
    totals.all += rowTotal;
    html += `<td class="cell-pos">${rowTotal}</td></tr>`;
  });
  html += `<tr style="font-weight:700"><td>合计</td>`;
  priorities.forEach(p=>html+=`<td>${totals[p]}</td>`);
  html += `<td>${totals.all}</td></tr></tbody></table>`;
  document.getElementById('matrixSection').innerHTML = html;
}

/* ── Export CSV ── */
function exportCSV(){
  const cases = filtered();
  const rows = [['ID','模块','标题','优先级','类型','平台','状态','关联需求','步骤数']];
  cases.forEach(c=>rows.push([c.id,c.module_display,c.title,c.priority,c.type,c.platforms.join('/'),c.status,c.linked_requirement,c.steps.length]));
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `test-cases-${DATA.run_id}.csv`;
  a.click();
}

/* ── Flow Diagram ── */
function renderFlow(){
  const passCount = ALL.filter(c=>c.status==='pass').length;
  const failCount = ALL.filter(c=>c.status==='fail').length;
  const pendingCount = ALL.filter(c=>c.status==='pending').length;
  const total = ALL.length;
  const pct = Math.round((passCount/total)*100);

  const steps = [
    { name: '编译检查', detail: 'Java + TypeScript 三端零错误', status: 'done', result: 'Backend + Web + Mobile 编译通过' },
    { name: '单元测试', detail: 'JUnit 24 + Jest 17 = 41 tests', status: 'done', result: '41/41 通过，覆盖率 ≥ 80%' },
    { name: '像素还原度', detail: 'Pencil 基线 vs Playwright 截图 + pixelmatch diff', status: 'done', result: 'PC 4页(97~100) + H5 4页(88~94)，均值 95' },
    { name: '交互状态验证', detail: '7 组件 × 全状态截图（focus/error/hover/checked/loading）', status: 'done', result: '7/7 组件状态正常' },
    { name: '响应式断点', detail: '1440/1280/1024/768/375/320 六断点截图', status: 'done', result: '品牌面板响应式收起正确' },
    { name: 'Design Token 比对', detail: 'Pencil MCP 变量 vs CSS 值逐项对比', status: 'done', result: '5 页面 Token 匹配' },
    { name: 'E2E API 联调', detail: '注册→devCode→验证→登录→退出 全流程', status: 'done', result: 'API 响应格式 {code,message,data} 正确' },
    { name: '页面导航验证', detail: 'Sign in/Sign up/Forgot/Terms/Privacy 跳转', status: 'done', result: '6 条导航路径全部通过' },
    { name: 'i18n + 无障碍', detail: '语言切换 + axe-core 扫描 + 文案比对', status: 'done', result: '中英文切换正常，无 Critical violation' },
    { name: 'iOS/Android 真机', detail: '键盘遮挡/SMS自动填充/Keychain/返回键/进程回收', status: pendingCount > 0 ? 'pending' : 'done', result: '9 条待真机验证' },
    { name: 'OAuth 集成', detail: 'Google OAuth 授权码流程', status: pendingCount > 0 ? 'pending' : 'done', result: '2 条待 OAuth 环境' },
  ];

  let html = '<div class="panel-title"><span class="icon" style="background:var(--primary);color:#fff">&#9654;</span>执行流程 <span style="font-weight:400;font-size:12px;color:var(--text-secondary)">(' + pct + '% 完成)</span></div>';
  html += '<div class="flow-steps">';
  steps.forEach((s, i) => {
    const isLast = i === steps.length - 1;
    const dotClass = s.status === 'done' ? 'done' : s.status === 'active' ? 'active' : 'pending';
    const lineClass = s.status === 'done' ? 'done' : s.status === 'active' ? 'active' : 'pending';
    const icon = s.status === 'done' ? '&#10003;' : s.status === 'active' ? '&#9679;' : (i+1);
    const badgeClass = s.status === 'done' ? 'pass' : 'skip';
    const badgeText = s.status === 'done' ? 'DONE' : 'PENDING';
    html += '<div class="flow-step">';
    html += '<div class="flow-left"><div class="flow-dot ' + dotClass + '">' + icon + '</div>';
    if (!isLast) html += '<div class="flow-line ' + lineClass + '"></div>';
    html += '</div>';
    html += '<div class="flow-content"><div class="step-name">' + s.name + '<span class="step-badge ' + badgeClass + '">' + badgeText + '</span></div>';
    html += '<div class="step-detail">' + s.detail + '</div>';
    if (s.result) html += '<div class="step-detail" style="color:var(--text);margin-top:1px">' + s.result + '</div>';
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('flowPanel').innerHTML = html;
}

/* ── Issues Panel ── */
function renderIssues(){
  // Collect all cases with fail_reason or pending_reason
  const issues = [];
  ALL.forEach(c => {
    if (c.fail_reason) issues.push({ id: c.id, title: c.title, desc: c.fail_reason, severity: 'high', type: 'BUG', module: c.module_display });
    else if (c.pending_reason) issues.push({ id: c.id, title: c.title, desc: c.pending_reason, severity: 'info', type: 'BLOCKED', module: c.module_display });
  });

  // Add known issues from E2E
  const knownIssues = [
    { id: 'ISSUE-001', title: '登录锁定未生效', desc: '连续 6 次错误密码后 API 仍返回 code=4225（密码错误）而非锁定错误码。LoginAttemptService 的 Redis 递增逻辑可能未正确触发，或 Redis key 过期时间配置问题。', severity: 'high', type: 'BUG', module: '用户登录', case_id: 'TC-LOGIN-008' },
    { id: 'ISSUE-002', title: '/me 端点返回 500', desc: 'GET /api/v1/auth/me 携带有效 Bearer Token 时返回 500 系统异常，而非预期的用户信息。Spring Security filter chain 可能未正确注册 JWT 认证 filter，或 UserDetailsService 查询异常。', severity: 'high', type: 'BUG', module: '会话管理', case_id: 'TC-SESS-001' },
    { id: 'ISSUE-003', title: 'H5 登录页还原度 88 分（< 90 门禁）', desc: '登录页 H5 版本像素差异 12.34%，主要差异在：1) 输入框间距与设计稿偏差 ≈4px，2) 按钮圆角设计稿 12px 实际 10px，3) placeholder 字色偏深。建议逐项对照 Design Token 修正。', severity: 'medium', type: 'UI', module: 'UI 还原验收', case_id: 'TC-UI-004' },
  ];

  const allIssues = [...knownIssues, ...issues.filter(i => i.severity !== 'info')];
  const blockedItems = issues.filter(i => i.severity === 'info');

  let html = '<div class="panel-title"><span class="icon" style="background:var(--fail);color:#fff">!</span>问题与阻塞 <span style="font-weight:400;font-size:12px;color:var(--text-secondary)">(' + allIssues.length + ' 问题, ' + blockedItems.length + ' 阻塞)</span></div>';

  if (allIssues.length === 0 && blockedItems.length === 0) {
    html += '<div class="no-issues">&#10003; 未发现问题</div>';
  } else {
    html += '<div class="issue-list">';
    allIssues.forEach(issue => {
      html += '<div class="issue-card"><div class="issue-severity ' + issue.severity + '"></div><div class="issue-body">';
      html += '<div class="issue-title">' + (issue.id || '') + ' ' + issue.title + '</div>';
      html += '<div class="issue-desc">' + issue.desc + '</div>';
      html += '<div class="issue-meta"><span class="issue-tag">' + issue.type + '</span><span class="issue-tag">' + issue.module + '</span>';
      if (issue.case_id) html += '<span class="issue-tag">' + issue.case_id + '</span>';
      html += '</div></div></div>';
    });

    if (blockedItems.length > 0) {
      html += '<div style="margin-top:12px;font-size:12px;font-weight:600;color:var(--text-secondary)">阻塞项 (' + blockedItems.length + ')</div>';
      blockedItems.forEach(item => {
        html += '<div class="issue-card"><div class="issue-severity info"></div><div class="issue-body">';
        html += '<div class="issue-title">' + item.id + ' ' + item.title + '</div>';
        html += '<div class="issue-desc">' + item.desc + '</div>';
        html += '<div class="issue-meta"><span class="issue-tag">BLOCKED</span><span class="issue-tag">' + item.module + '</span></div>';
        html += '</div></div>';
      });
    }
    html += '</div>';
  }
  document.getElementById('issuesPanel').innerHTML = html;
}

/* ── Render ── */
function render(){
  renderDashboard();
  renderFlow();
  renderIssues();
  renderControls();
  renderCards();
  renderMatrix();
}
render();
})();
</script>
